<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo & Trafic Aérien - EBLG/EBCI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Météo & Trafic Aérien</h1>
    <div class="airport-container">
        <div class="airport" id="eblg">
            <h2>Liège (EBLG)</h2>
            <div class="weather"></div>
            <div class="runway"></div>
            <div class="flights"></div>
            <div class="sonometers"></div>
        </div>
        <div class="airport" id="ebci">
            <h2>Charleroi (EBCI)</h2>
            <div class="weather"></div>
            <div class="runway"></div>
            <div class="flights"></div>
            <div class="sonometers"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
